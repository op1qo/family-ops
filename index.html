// ── Sheet component ───────────────────────────────────────────────
function Sheet({ open, onClose, title, children }) {
  const ref = useRef(null);
  const s = useRef({ startY:0, dy:0, on:false });
  const touchStart = e => { s.current={startY:e.touches[0].clientY,dy:0,on:true}; if(ref.current)ref.current.style.transition="none"; };
  const touchMove = e => {
    if(!s.current.on)return;
    const dy=Math.max(0,e.touches[0].clientY-s.current.startY); s.current.dy=dy;
    if(ref.current)ref.current.style.transform=`translateY(${dy}px)`;
    if(dy>5)e.preventDefault();
  };
  const touchEnd = () => {
    if(!s.current.on)return; s.current.on=false;
    if(s.current.dy>90){ if(ref.current){ref.current.style.transition="transform .22s cubic-bezier(.32,.72,0,1)";ref.current.style.transform="translateY(100%)";}setTimeout(onClose,230); }
    else { if(ref.current){ref.current.style.transition="transform .18s ease";ref.current.style.transform="translateY(0)";setTimeout(()=>{if(ref.current)ref.current.style.transition="";},190);} }
  };
  if(!open)return null;
  return h('div',{onClick:e=>{if(e.target===e.currentTarget)onClose();},style:{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:400,display:"flex",alignItems:"flex-end"}},
    h('div',{ref,style:{background:"white",borderRadius:"24px 24px 0 0",width:"100%",maxHeight:"88vh",overflowY:"auto",paddingBottom:40,animation:"su .28s cubic-bezier(.32,.72,0,1) both",willChange:"transform"}},
      h('div',{onTouchStart:touchStart,onTouchMove:touchMove,onTouchEnd:touchEnd,style:{display:"flex",alignItems:"center",justifyContent:"center",padding:"14px 0 6px",cursor:"grab",touchAction:"none",userSelect:"none"}},
        h('div',{style:{width:40,height:4,background:"#d1d5db",borderRadius:2}})
      ),
      h('div',{style:{padding:"0 20px"}},
        title && h('div',{style:{fontSize:18,fontWeight:800,color:"#1e293b",marginBottom:20}},title),
        children
      )
    )
  );
}

const FREQS = ["daily","weekly","fortnightly","monthly","ad-hoc"];

// ISO week number — used to determine which fortnight a date falls in.
// Week parity (odd/even) is consistent globally so both devices agree.
const isoWeek = date => {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
};
// Returns true when the date falls on the task's chosen fortnight (Week A or Week B).
// fortnightWeek: 0 = fires on even ISO weeks, 1 = fires on odd ISO weeks.
const isFortnightlyMatch = (date, fortnightWeek) => {
  const week = isoWeek(date);
  return (week % 2) === (fortnightWeek ?? 0);
};

function Calendar({ tasks, done, onToggle }) {
  const now = new Date();
  const [cm,setCm] = useState(now.getMonth());
  const [cy,setCy] = useState(now.getFullYear());
  const [of,setOf] = useState("all");
  const [expanded,setExpanded] = useState({});
  const first=new Date(cy,cm,1), last=new Date(cy,cm+1,0);
  const monthName=first.toLocaleString("default",{month:"long"});
  const DOWS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const tasksForDay = useCallback((d,dow,month,year)=>tasks.filter(t=>{
    if(t.freq==="daily")return true;
    if(t.freq==="monthly")return d===1;
    if(t.freq==="weekly")return dow===(t.weekday??1);
    if(t.freq==="fortnightly"){
      if(dow!==(t.weekday??1)) return false;
      return isFortnightlyMatch(new Date(year,month,d), t.fortnightWeek??0);
    }
    return false;
  }),[tasks]);

  const prev=()=>cm===0?(setCm(11),setCy(y=>y-1)):setCm(m=>m-1);
  const next=()=>cm===11?(setCm(0),setCy(y=>y+1)):setCm(m=>m+1);
  const iconBtn={width:36,height:36,borderRadius:10,background:"#f3f4f6",border:"none",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"};

  const days=[];
  for(let d=1;d<=last.getDate();d++) days.push(d);

  return h('div',null,
    // Header
    h('div',{style:{background:"white",borderBottom:"1px solid #f0f0f0",position:"sticky",top:0,zIndex:20}},
      h('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px"}},
        h('button',{onClick:prev,style:iconBtn},"‹"),
        h('span',{style:{fontSize:16,fontWeight:800,color:"#1e293b"}},`${monthName} ${cy}`),
        h('button',{onClick:next,style:iconBtn},"›")
      ),
      h('div',{style:{display:"flex",gap:7,padding:"0 16px 12px",overflowX:"auto",scrollbarWidth:"none"}},
        ["all","gail","omar","shared"].map(o=>{
          const act=of===o;
          return h('button',{key:o,onClick:()=>setOf(o),style:{flexShrink:0,padding:"6px 13px",borderRadius:999,border:"none",background:act?(o==="gail"?C.gail:o==="omar"?C.omar:o==="shared"?C.shared:C.indigo):"#f3f4f6",color:act?"white":"#6b7280",fontSize:12,fontWeight:700,cursor:"pointer"}},
            o==="all"?"All":`${ownerEmoji(o)} ${o.charAt(0).toUpperCase()+o.slice(1)}`
          );
        })
      )
    ),
    // Agenda rows
    h('div',{style:{paddingBottom:40}},
      days.map(d=>{
        const date=new Date(cy,cm,d), dow=date.getDay();
        const isToday=d===now.getDate()&&cm===now.getMonth()&&cy===now.getFullYear();
        let dt=tasksForDay(d,dow,cm,cy);
        if(of!=="all") dt=dt.filter(t=>t.owner===of);
        if(!dt.length) return null;
        const showAll=expanded[d];
        const visible=showAll?dt:dt.slice(0,3);
        return h('div',{key:d,style:{borderBottom:"1px solid #f3f4f6"}},
          // Day header
          h('div',{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 16px 6px",background:isToday?"#f5f3ff":"white",position:"sticky",top:112,zIndex:10}},
            h('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",width:36,flexShrink:0}},
              h('div',{style:{fontSize:10,fontWeight:700,color:isToday?C.indigo:"#9ca3af",textTransform:"uppercase",letterSpacing:".05em"}},DOWS[dow]),
              h('div',{style:{width:28,height:28,borderRadius:"50%",background:isToday?C.indigo:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:isToday?"white":"#1e293b"}},d)
            ),
            h('div',{style:{flex:1,height:1,background:"#f0f0f0"}})
          ),
          // Task pills
          h('div',{style:{padding:"0 16px 8px"}},
            visible.map(t=>{
              const dk=`${t.id}_${cy}_${cm}_${d}`;
              const isDone=!!done[dk];
              return h('div',{key:t.id,onClick:()=>onToggle(dk),style:{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",marginBottom:4,borderRadius:12,background:isDone?"#f9fafb":"white",border:`1px solid ${isDone?"#f0f0f0":ownerLight(t.owner)}`,cursor:"pointer",borderLeft:`3px solid ${isDone?"#e5e7eb":ownerColor(t.owner)}`}},
                h('div',{style:{width:18,height:18,borderRadius:5,border:isDone?"none":"1.5px solid #e5e7eb",background:isDone?C.indigo:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                  isDone&&h('svg',{width:9,height:7,viewBox:"0 0 9 7",fill:"none"},h('path',{d:"M1 3.5L3.2 5.5L8 1",stroke:"white",strokeWidth:"1.5",strokeLinecap:"round",strokeLinejoin:"round"}))
                ),
                h('div',{style:{flex:1,minWidth:0}},
                  h('div',{style:{fontSize:13,fontWeight:600,color:isDone?"#9ca3af":"#1e293b",textDecoration:isDone?"line-through":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},t.title)

            )
          )
        );
      })
    )
  );
}

// ── Main App ──────────────────────────────────────────────────────
function App() {
  const [tasks,    setTasks]   = useState(JSON.parse(JSON.stringify(SEED_TASKS)));
  const [done,     setDone]    = useState({});
  const [hist,     setHist]    = useState([]);
  const [tab,      setTab]     = useState("gail");
  const [freq,     setFreq]    = useState("all");
  const [modal,    setModal]   = useState(null);
  const [confirm,  setConfirm] = useState(null);
  const [syncing,  setSyncing] = useState(false);
  const [syncErr,  setSyncErr] = useState(false);
  const [saving,   setSaving]  = useState(false);
  const [loaded,   setLoaded]  = useState(!configured); // if no supabase, skip loading

  // ── Load from Supabase on mount ──
  useEffect(() => {
    if(!sb) return;
    const load = async () => {
      setSyncing(true);
      try {
        const dk = todayKey();
        // Load today's completions — only compound keys are valid (id_year_month_day)
        const { data: comps, error: ce } = await sb.from('completions').select('task_key').eq('day', dk);
        if(ce) throw ce;
        const d = {};
        comps?.forEach(r => {
          const parts = r.task_key.split('_');
          if(parts.length === 4) {
            d[r.task_key] = true;             // compound key for calendar
            d[parseInt(parts[0])] = true;      // bare id for task list checkbox
          }
        });
        // Load calendar completions (other days) — compound keys only
        const { data: calComps, error: cale } = await sb.from('completions').select('task_key').neq('day', dk);
        if(cale) throw cale;
        calComps?.forEach(r => {
          if(r.task_key.includes('_')) d[r.task_key] = true;
        });
        setDone(d);

        // Load custom tasks, seed overrides, and deleted seeds in parallel
        const [
          { data: customTasks,   error: te  },
          { data: seedOverrides, error: soe },
          { data: deletedSeeds,  error: dse },
        ] = await Promise.all([
          sb.from('custom_tasks').select('*').order('id'),
          sb.from('seed_overrides').select('*'),
          sb.from('deleted_seeds').select('seed_id'),
        ]);
        if(te)  throw te;
        if(soe) throw soe;
        if(dse) throw dse;

        const deletedIds = new Set((deletedSeeds||[]).map(r => r.seed_id));
        const overrideMap = {};
        (seedOverrides||[]).forEach(r => { overrideMap[r.seed_id] = r; });

        const maxSeed = Math.max(...SEED_TASKS.map(t=>t.id));
        const baseTasks = SEED_TASKS
          .filter(t => !deletedIds.has(t.id))
          .map(t => overrideMap[t.id]
            ? { ...t, title: overrideMap[t.id].title||t.title, desc: overrideMap[t.id].description||t.desc, owner: overrideMap[t.id].owner||t.owner, freq: overrideMap[t.id].freq||t.freq, cat: overrideMap[t.id].cat||t.cat, ml: overrideMap[t.id].ml??t.ml, weekday: overrideMap[t.id].weekday??t.weekday, fortnightWeek: overrideMap[t.id].fortnight_week??t.fortnightWeek, _seedOverride: true }
            : t
          );
        const extras = (customTasks||[]).map(t => ({...t, desc: t.description||'', id: t.id + maxSeed, _dbId: t.id, fortnightWeek: t.fortnight_week??undefined}));
        setTasks([...baseTasks, ...extras]);

        // Load history
        const { data: histData, error: he } = await sb.from('history').select('*').order('time', {ascending:false}).limit(60);
        if(he) throw he;
        setHist(histData || []);

        setSyncErr(false);
      } catch(e) {
        console.error('Supabase load error:', e);
        setSyncErr(true);
        toast('Sync error — running offline');
        // Still show the app even if Supabase fails
      } finally {
        setSyncing(false);
        setLoaded(true);
      }
    };
    load();
  }, []);

  // ── Real-time subscriptions ──
  useEffect(() => {
    if(!sb) return;

    // Helper: rebuild task list from DB (called after any custom_task / seed change)
    const reloadTasks = async () => {
      try {
        const [
          { data: customTasks,   error: te  },
          { data: seedOverrides, error: soe },
          { data: deletedSeeds,  error: dse },
        ] = await Promise.all([
          sb.from('custom_tasks').select('*').order('id'),
          sb.from('seed_overrides').select('*'),
          sb.from('deleted_seeds').select('seed_id'),
        ]);
        if(te || soe || dse) throw (te || soe || dse);
        const deletedIds = new Set((deletedSeeds||[]).map(r => r.seed_id));
        const overrideMap = {};
        (seedOverrides||[]).forEach(r => { overrideMap[r.seed_id] = r; });
        const maxSeed = Math.max(...SEED_TASKS.map(t=>t.id));
        const baseTasks = SEED_TASKS
          .filter(t => !deletedIds.has(t.id))
          .map(t => overrideMap[t.id]
            ? { ...t, title: overrideMap[t.id].title||t.title, desc: overrideMap[t.id].description||t.desc, owner: overrideMap[t.id].owner||t.owner, freq: overrideMap[t.id].freq||t.freq, cat: overrideMap[t.id].cat||t.cat, ml: overrideMap[t.id].ml??t.ml, weekday: overrideMap[t.id].weekday??t.weekday, fortnightWeek: overrideMap[t.id].fortnight_week??t.fortnightWeek, _seedOverride: true }
            : t
          );
        const extras = (customTasks||[]).map(t => ({...t, desc: t.description||'', id: t.id + maxSeed, _dbId: t.id, fortnightWeek: t.fortnight_week??undefined}));
        setTasks([...baseTasks, ...extras]);
      } catch(e) {
        console.error('reloadTasks error:', e);
        setSyncErr(true);
      }
    };

    // Completions channel (tick/untick)
    const compSub = sb.channel('rt-completions')
      .on('postgres_changes', {event:'INSERT', schema:'public', table:'completions'}, payload => {
        const tk = payload.new?.task_key;
        if(!tk || !tk.includes('_')) return;
        const parts = tk.split('_');
        setDone(d => {
          const n = {...d, [tk]: true};
          if(parts.length === 4) n[parseInt(parts[0])] = true;
          return n;
        });
      })
      .on('postgres_changes', {event:'DELETE', schema:'public', table:'completions'}, payload => {
        const tk = payload.old?.task_key;
        if(!tk) return;
        const parts = tk.split('_');
        setDone(d => {
          const n = {...d}; delete n[tk];
          if(parts.length === 4) delete n[parseInt(parts[0])];
          return n;
        });
      })
      .subscribe();

    // Tasks channel — any change to custom_tasks, seed_overrides, or deleted_seeds
    const taskSub = sb.channel('rt-tasks')
      .on('postgres_changes', {event:'*', schema:'public', table:'custom_tasks'},   () => reloadTasks())
      .on('postgres_changes', {event:'*', schema:'public', table:'seed_overrides'}, () => reloadTasks())
      .on('postgres_changes', {event:'*', schema:'public', table:'deleted_seeds'},  () => reloadTasks())
      .subscribe();

    return () => { sb.removeChannel(compSub); sb.removeChannel(taskSub); };
  }, []);

  const today = new Date();
  const dateStr = today.toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});
  const showFreq = !["calendar","history"].includes(tab);
  const visibleTasks = (() => {
    let l = tab==="master" ? tasks : tasks.filter(t=>t.owner===tab);
    if(freq!=="all") l=l.filter(t=>t.freq===freq);
    return l;
  })();
  const cats = [...new Set(visibleTasks.map(t=>t.cat))];
  const todayParts = `_${today.getFullYear()}_${today.getMonth()}_${today.getDate()}`;
  const doneToday = Object.entries(done).filter(([k,v])=>v&&k.endsWith(todayParts)).length;

  const todayCompoundKey = (id) => {
    const t = new Date();
    return `${id}_${t.getFullYear()}_${t.getMonth()}_${t.getDate()}`;
  };

  const toggleDone = async (id) => {
    const ck = todayCompoundKey(id);
    const was = !!done[ck];
    const dk = todayKey();
    // Optimistic update — set both the compound key (calendar) and bare id (doneToday count)
    setDone(d => ({...d,[ck]:!was,[id]:!was}));
    if(!was) {
      const t = tasks.find(x=>x.id===id);
      if(t) {
        const entry = {id,title:t.title,owner:t.owner,time:new Date().toISOString()};
        setHist(h => [entry,...h].slice(0,200));
        if(sb) { sb.from('history').insert({task_id:id,title:t.title,owner:t.owner,time:entry.time}).then(()=>{}); }
      }
    }
    if(sb) {
      if(!was) {
        const {error} = await sb.from('completions').insert({task_key:ck, day:dk});
        if(error && error.code !== '23505') { setDone(d=>({...d,[ck]:was,[id]:was})); setSyncErr(true); }
      } else {
        const {error} = await sb.from('completions').delete().eq('task_key',ck).eq('day',dk);
        if(error) { setDone(d=>({...d,[ck]:was,[id]:was})); setSyncErr(true); }
      }
    }
  };

  const toggleCal = async (key) => {
    const was = !!done[key];
    setDone(d => ({...d,[key]:!was}));
    if(sb) {
      // Key format: taskId_year_month_day  (month is 0-based JS month)
      // day column stores ISO date: YYYY-MM-DD  (month is 1-based)
      const parts = key.split('_');
      const dayStr = `${parts[1]}-${String(parseInt(parts[2])+1).padStart(2,'0')}-${String(parts[3]).padStart(2,'0')}`;
      if(!was) {
        const {error} = await sb.from('completions').insert({task_key:key, day:dayStr});
        if(error && error.code !== '23505') { setDone(d=>({...d,[key]:was})); setSyncErr(true); }
      } else {
        const {error} = await sb.from('completions').delete().eq('task_key',key);
        if(error) { setDone(d=>({...d,[key]:was})); setSyncErr(true); }
      }
    }
  };

  const handleSave = async (form) => {
    setSaving(true);
    try {
      if(modal === "add") {
        if(sb) {
          const dbForm = {
            title: form.title, description: form.desc || '',
            owner: form.owner, freq: form.freq, cat: form.cat,
            ml: form.ml, weekday: form.weekday ?? null,
            fortnight_week: form.fortnightWeek ?? null,
          };
          const {data,error} = await sb.from('custom_tasks').insert(dbForm).select().single();
          if(error) throw error;
          const maxSeed = Math.max(...SEED_TASKS.map(t=>t.id));
          setTasks(ts => [...ts, {...form, desc: data.description||'', id: data.id + maxSeed, _dbId: data.id}]);
          toast('Task added & synced ✓');
        } else {
          const maxId = tasks.reduce((m,t)=>Math.max(m,t.id),0);
          setTasks(ts => [...ts, {id:maxId+1,...form}]);
        }
      } else {
        // Custom task (has _dbId) — update in custom_tasks
        if(sb && modal._dbId) {
          const dbForm = {
            title: form.title, description: form.desc || '',
            owner: form.owner, freq: form.freq, cat: form.cat,
            ml: form.ml, weekday: form.weekday ?? null,
          };
          const {error} = await sb.from('custom_tasks').update(dbForm).eq('id', modal._dbId);
          if(error) throw error;
          toast('Task saved ✓');
        }
        // Seed task (no _dbId) — upsert into seed_overrides so it persists across refreshes
        else if(sb && !modal._dbId) {
          const dbForm = {
            seed_id: modal.id,
            title: form.title, description: form.desc || '',
            owner: form.owner, freq: form.freq, cat: form.cat,
            ml: form.ml, weekday: form.weekday ?? null,
            fortnight_week: form.fortnightWeek ?? null,
          };
          const {error} = await sb.from('seed_overrides').upsert(dbForm, {onConflict:'seed_id'});
          if(error) throw error;
          toast('Task saved ✓');
        }
        setTasks(ts => ts.map(t => t.id===modal.id ? {...t,...form} : t));
      }
    } catch(e) {
      console.error(e); setSyncErr(true); toast('Save failed: ' + (e.message||e));
    } finally {
      setSaving(false); setModal(null);
    }
  };

  const handleDelete = () => {
    // Capture snapshot NOW — modal will be null by the time onOk fires
    const targetId    = modal.id;
    const targetDbId  = modal._dbId;
    const isSeedTask  = !targetDbId;
    setConfirm({
      title:"Delete task?", msg: isSeedTask
        ? "This will permanently hide this task for everyone."
        : "This permanently removes the task for everyone.",
      okLabel:"Delete", okColor:"#ef4444",
      onOk: async () => {
        setModal(null);
        if(sb) {
          if(targetDbId) {
            // Custom task — delete from custom_tasks
            const {error} = await sb.from('custom_tasks').delete().eq('id', targetDbId);
            if(error) { toast('Delete failed: ' + error.message); return; }
          } else {
            // Seed task — record deletion so it survives refresh
            const {error} = await sb.from('deleted_seeds').upsert({seed_id: targetId}, {onConflict:'seed_id'});
            if(error) { toast('Delete failed: ' + error.message); return; }
            // Also remove any override for this seed
            await sb.from('seed_overrides').delete().eq('seed_id', targetId);
          }
        }
        setTasks(ts => ts.filter(t => t.id !== targetId));
        setDone(d => { const n={...d}; delete n[targetId]; return n; });
        toast('Task deleted ✓');
      }
    });
  };

  const handleReset = () => {
    const owner = ["master","calendar","history"].includes(tab) ? "all" : tab;
    const ownerLabel = owner==="all" ? "everyone" : owner.charAt(0).toUpperCase()+owner.slice(1);
    const ownerTasks = tasks.filter(t => owner==="all" || t.owner===owner).map(t=>String(t.id));
    setConfirm({
      title:`Reset ${ownerLabel}'s tasks?`, msg:`Clears today's completions for ${ownerLabel}. Calendar completions are kept.`,
      okLabel:"Reset", okColor:"#f59e0b",
      onOk: async () => {
        const dk = todayKey();
        const t = new Date();
        const suffix = `_${t.getFullYear()}_${t.getMonth()}_${t.getDate()}`;
        setDone(d => {
          const n={...d};
          ownerTasks.forEach(tid => {
            delete n[tid];              // bare id
            delete n[`${tid}${suffix}`]; // compound key
          });
          return n;
        });
        if(sb) {
          for(const tid of ownerTasks) {
            await sb.from('completions').delete().eq('task_key', `${tid}${suffix}`).eq('day', dk);
          }
        }
        toast(`${ownerLabel} reset ✓`);
      }
    });
  };

  const defaultOwner = ["master","calendar","history"].includes(tab) ? "gail" : tab;

  if(!loaded) return h('div',{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}},
    h('div',{style:{width:40,height:40,border:"3px solid #e5e7eb",borderTopColor:C.indigo,borderRadius:"50%",animation:"spin .7s linear infinite"}}),
    h('div',{style:{fontSize:14,color:"#9ca3af",fontWeight:600}},"Syncing with Supabase…")
  );

  return h('div',{style:{fontFamily:"system-ui,'Outfit',sans-serif",background:C.bg,minHeight:"100vh",maxWidth:600,margin:"0 auto"}},
    // HEADER
    h('div',{style:{background:"white",borderBottom:"1px solid #f0f0f0",padding:"14px 16px 0",position:"sticky",top:0,zIndex:60}},
      h('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
        h('div',null,
          h('div',{style:{display:"flex",alignItems:"center",gap:8}},
            h('div',{style:{fontSize:22,fontWeight:800,color:"#1e293b",letterSpacing:"-0.03em",lineHeight:1}},"Family Ops"),
            h(SyncBadge,{syncing,error:syncErr})
          ),
          h('div',{style:{fontSize:12,color:"#9ca3af",fontWeight:500,marginTop:2}},dateStr)
        ),
        h('div',{style:{display:"flex",gap:8,alignItems:"center"}},
          h('button',{onClick:()=>setModal("add"),style:{background:C.indigo,color:"white",padding:"9px 14px",borderRadius:12,fontSize:13,fontWeight:700,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4}},
            h('span',{style:{fontSize:18,lineHeight:1}},"+")," Add"
          ),
          h('button',{onClick:handleReset,title:"Reset today",style:{background:"#f3f4f6",color:"#374151",padding:"9px 12px",borderRadius:12,fontSize:15,fontWeight:700,border:"none",cursor:"pointer"}},"↺")
        )
      ),
      // Tabs
      h('div',{style:{display:"flex",overflowX:"auto",margin:"0 -16px",scrollbarWidth:"none"}},
        [["gail","👩 Gail"],["omar","👨 Omar"],["shared","🤝 Shared"],["master","📋 Master"],["calendar","📅 Calendar"],["history","🕐 History"]].map(([v,label])=>
          h('div',{key:v,onClick:()=>setTab(v),style:{flexShrink:0,padding:"12px 16px",fontSize:13,fontWeight:600,color:tab===v?C.indigo:"#6b7280",borderBottom:`2px solid ${tab===v?C.indigo:"transparent"}`,whiteSpace:"nowrap",cursor:"pointer",userSelect:"none"}},label)
        )
      )
    ),

    // STATS
    h('div',{style:{display:"flex",gap:8,padding:"12px 16px",overflowX:"auto",scrollbarWidth:"none"}},
      [{label:"Gail",val:tasks.filter(t=>t.owner==="gail").length,color:C.gail},{label:"Omar",val:tasks.filter(t=>t.owner==="omar").length,color:C.omar},{label:"Shared",val:tasks.filter(t=>t.owner==="shared").length,color:C.shared},{label:"Done",val:doneToday,color:"#8b5cf6"}].map(s=>
        h('div',{key:s.label,style:{background:"white",borderRadius:12,padding:"10px 14px",border:"1px solid #f0f0f0",flex:1,minWidth:0,borderLeft:`3px solid ${s.color}`}},
          h('div',{style:{fontSize:18,fontWeight:800,color:s.color}},s.val),
          h('div',{style:{fontSize:10,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".05em"}},s.label)
        )
      )
    ),

    // FREQ FILTER
    showFreq && h('div',{style:{display:"flex",gap:8,padding:"0 16px 12px",overflowX:"auto",scrollbarWidth:"none"}},
      ["all","daily","weekly","fortnightly","monthly","ad-hoc"].map(f=>
        h('div',{key:f,onClick:()=>setFreq(f),style:{flexShrink:0,padding:"6px 14px",borderRadius:999,fontSize:12,fontWeight:600,cursor:"pointer",border:`1.5px solid ${freq===f?C.indigo:"#e5e7eb"}`,color:freq===f?"white":"#6b7280",background:freq===f?C.indigo:"white",userSelect:"none"}},
          f.charAt(0).toUpperCase()+f.slice(1)
        )
      )
    ),

    // CONTENT
    h('div',{style:{paddingBottom:80}},
      tab==="calendar" && h(Calendar,{tasks,done,onToggle:toggleCal}),
      tab==="history"  && h(History,{history:hist}),
      showFreq && (
        visibleTasks.length===0
          ? h('div',{style:{textAlign:"center",padding:"60px 24px",color:"#9ca3af"}},
              h('div',{style:{fontSize:"3rem",marginBottom:12}},"✓"),
              h('div',{style:{fontSize:15,fontWeight:600}},"No tasks here"),
              h('div',{style:{fontSize:13,marginTop:4}},"Try a different filter or add a task")
            )
          : cats.map(cat=>
              h('div',{key:cat},
                h('div',{style:{padding:"4px 16px 2px",marginTop:8}},
                  h('span',{style:{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:"#9ca3af"}},cat)
                ),
                visibleTasks.filter(t=>t.cat===cat).map((t,i)=>{
                  const isDone=!!done[todayCompoundKey(t.id)];
                  const oc=ownerColor(t.owner),ol=ownerLight(t.owner),oe=ownerEmoji(t.owner);
                  return h('div',{key:t.id,style:{background:"white",borderRadius:20,margin:"0 16px 12px",padding:16,boxShadow:"0 1px 3px rgba(0,0,0,.06)",border:"1px solid #f0f0f0",opacity:isDone?.5:1,animation:"fi .2s ease both",animationDelay:`${i*20}ms`}},
                    h('div',{style:{display:"flex",alignItems:"flex-start",gap:12}},
                      h('div',{onClick:()=>toggleDone(t.id),style:{width:28,height:28,borderRadius:8,border:isDone?"none":"2px solid #e5e7eb",background:isDone?C.indigo:"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}},
                        isDone && h('svg',{width:12,height:10,viewBox:"0 0 12 10",fill:"none"},h('path',{d:"M1 5L4.5 8.5L11 1",stroke:"white",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"}))
                      ),
                      h('div',{style:{flex:1,minWidth:0}},
                        h('div',{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:5}},
                          h('span',{style:{fontSize:14,fontWeight:700,color:isDone?"#9ca3af":"#1e293b",lineHeight:1.3,textDecoration:isDone?"line-through":"none"}},t.title),
                          t.ml && h('span',{title:"High mental load"},"🧠")
                        ),
                        h('div',{style:{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}},
                          h('span',{style:{display:"inline-flex",alignItems:"center",padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:600,background:ol,color:oc}},`${oe} ${t.owner.charAt(0).toUpperCase()+t.owner.slice(1)}`),
                          h('span',{style:{display:"inline-flex",alignItems:"center",padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:600,background:"#f3f4f6",color:"#6b7280"}},t.freq),
                          t.ml && h('span',{style:{display:"inline-flex",alignItems:"center",padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:600,background:"#fef3c7",color:"#d97706"}},"Mental load")
                        ),
                        t.desc && h('div',{style:{background:"#f8f7f5",borderRadius:12,padding:12,fontSize:12,color:"#374151",lineHeight:1.6,marginTop:8,borderLeft:"3px solid #e5e7eb"}},t.desc)
                      ),
                      h('button',{onClick:()=>setModal(t),style:{width:30,height:30,borderRadius:8,background:"#f3f4f6",border:"none",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},"✏️")
                    )
                  );
                })
              )
            )
      )
    ),

    // MODAL
    h(Sheet,{open:!!modal,onClose:()=>setModal(null),title:modal==="add"?"Add Task":"Edit Task"},
      !!modal && h(TaskForm,{
        initial: modal==="add" ? {title:"",desc:"",owner:defaultOwner,freq:"daily",cat:"",weekday:1,ml:false} : modal,
        onSave: handleSave,
        onClose: ()=>setModal(null),
        onDelete: modal!=="add" ? handleDelete : undefined,
        saving
      })
    ),

    // CONFIRM
    h(Confirm,{
      open:!!confirm,
      title:confirm?.title,
      msg:confirm?.msg,
      okLabel:confirm?.okLabel,
      okColor:confirm?.okColor,
      onOk:()=>{ confirm.onOk(); setConfirm(null); },
      onCancel:()=>setConfirm(null)
    })
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
